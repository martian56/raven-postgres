name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: martian56/setup-raven@v1
        with:
          raven-version: "2.26.1"
      - run: rvpm fmt --check
      - run: rvpm build
      - run: rvpm test
      - run: rvpm doc

  postgres-e2e:
    name: PostgreSQL ${{ matrix.postgres }} end-to-end
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        postgres: ["16.9-alpine", "17.5-alpine"]
    env:
      POSTGRES_IMAGE: postgres:${{ matrix.postgres }}
    steps:
      - uses: actions/checkout@v7
      - uses: martian56/setup-raven@v1
        with:
          raven-version: "2.26.1"
      - run: sh scripts/test-e2e.sh
