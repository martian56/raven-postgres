name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit:
    name: Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: martian56/setup-raven@v1
        with:
          raven-version: "2.26.1"
      - run: rvpm fmt --check
      - run: rvpm build
      - run: rvpm test
      - run: rvpm doc

  postgres-e2e:
    name: PostgreSQL ${{ matrix.postgres }} end-to-end
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        postgres: ["16.9-alpine", "17.5-alpine"]
    env:
      POSTGRES_IMAGE: postgres:${{ matrix.postgres }}
    steps:
      - uses: actions/checkout@v4
      - uses: martian56/setup-raven@v1
        with:
          raven-version: "2.26.1"
      - run: sh scripts/test-e2e.sh
